<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="keylineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e1e2e" stroke="url(#keylineGradient)" stroke-width="2"/>
  
  <!-- Key shape - angular/square head to avoid circle-in-circle look -->
  <!-- Key head (square bow) -->
  <rect x="22" y="38" width="18" height="24" rx="3"
        stroke="url(#keylineGradient)" 
        stroke-width="4" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- Key shaft -->
  <line x1="40" y1="50" x2="75" y2="50" 
        stroke="url(#keylineGradient)" 
        stroke-width="4" 
        stroke-linecap="round"/>
  
  <!-- Key teeth (bit) - two teeth pointing down -->
  <line x1="58" y1="50" x2="58" y2="60" 
        stroke="url(#keylineGradient)" 
        stroke-width="4" 
        stroke-linecap="round"/>
  <line x1="68" y1="50" x2="68" y2="60" 
        stroke="url(#keylineGradient)" 
        stroke-width="4" 
        stroke-linecap="round"/>
</svg>
