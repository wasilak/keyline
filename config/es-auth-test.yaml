# Keyline Configuration for Testing with Authenticated Elasticsearch Cluster
#
# Usage:
#   1. Set your ES password: export ES_PASSWORD="your-elasticsearch-password"
#   2. Build Keyline: task build
#   3. Start Keyline: ./bin/keyline --config config/es-auth-test.yaml
#   4. Test: curl -u testuser:password http://localhost:9000/_cluster/health?pretty

server:
  port: 9000
  mode: standalone
  read_timeout: 30s
  write_timeout: 30s
  max_concurrent: 1000

# Local user authentication
# Username: testuser
# Password: password
local_users:
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      groups:
        - developers
        - users
      email: testuser@example.com
      full_name: Test User
    
    - username: admin
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      groups:
        - admin
      email: admin@example.com
      full_name: Admin User

# OIDC disabled for simple testing
oidc:


# Session configuration
session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

# In-memory cache for testing (no Redis required)
cache:
  backend: memory
  # Credential cache TTL for user management
  credential_ttl: 1h
  # Encryption key for cached credentials (32 bytes for AES-256)
  encryption_key: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==  # base64: "test-encryption-key-32-bytes"

# Role mappings for dynamic user management
role_mappings:
  - claim: groups
    pattern: "admin"
    es_roles:
      - superuser
  
  - claim: groups
    pattern: "developers"
    es_roles:
      - developer
      - kibana_user

# Default roles if no mappings match
default_es_roles:
  - viewer
  - kibana_user

# Elasticsearch credentials
# The ES user that Keyline will use to authenticate to Elasticsearch
elasticsearch:
  # Admin credentials for user management API
  admin_user: elastic  # Change this to your ES username
  admin_password: ${ES_PASSWORD}  # Set via environment variable
  url: https://localhost:9200
  timeout: 30s
  insecure_skip_verify: true
  
  # Static users (legacy mode, only used when user_management.enabled is false)

# Dynamic user management configuration
user_management:
  # Enable for testing dynamic user management

  password_length: 32
  credential_ttl: 1h

# Upstream Elasticsearch cluster
# Use http://localhost:9200 for ES 8.x without SSL (docker-compose-es8-auth.yml)
# Use https://localhost:9200 for ES 9.3 with SSL (docker-compose.yml)
upstream:
  url: https://localhost:9200
  timeout: 30s
  max_idle_conns: 100
  # Set to true to skip TLS certificate verification (useful for self-signed certificates)
  # WARNING: Only use this in development/testing environments
  insecure_skip_verify: true

# Debug logging to see what's happening
observability:
  log_level: debug
  log_format: text
  otel_enabled: false
