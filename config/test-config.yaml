server:
  port: 9000
  mode: standalone
  read_timeout: 30s
  write_timeout: 30s
  max_concurrent: 1000

# Local users for testing Basic Auth
local_users:
  enabled: true
  users:
    - username: testuser
      password_bcrypt: $2y$05$nK4h5MH0MAIzd.R1wZFrUOrYoPiCdXRc3LACW0vByWWGS6LbQHlce  # password: "password"
      groups:
        - developers
        - users
      email: testuser@example.com
      full_name: Test User

    - username: admin
      password_bcrypt: $2y$05$nK4h5MH0MAIzd.R1wZFrUOrYoPiCdXRc3LACW0vByWWGS6LbQHlce  # password: "password"
      groups:
        - admin
      email: admin@example.com
      full_name: Admin User

    - username: viewer
      password_bcrypt: $2y$05$nK4h5MH0MAIzd.R1wZFrUOrYoPiCdXRc3LACW0vByWWGS6LbQHlce  # password: "password"
      email: viewer@example.com
      full_name: Viewer User

oidc:
  enabled: false

session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

cache:
  backend: memory
  credential_ttl: 1h
  encryption_key: 12345678901234567890123456789012  # exactly 32 characters for AES-256

# Role mappings for dynamic user management
role_mappings:
  - claim: groups
    pattern: "admin"
    es_roles:
      - superuser

  - claim: groups
    pattern: "developers"
    es_roles:
      - developer
      - kibana_user

  - claim: groups
    pattern: "users"
    es_roles:
      - user

# Default roles if no mappings match
default_es_roles:
  - viewer
  - kibana_user

elasticsearch:
  # Admin credentials for user management API
  admin_user: elastic
  admin_password: changeme
  url: https://localhost:9200
  timeout: 30s
  insecure_skip_verify: true

# Dynamic user management configuration
user_management:
  password_length: 32
  credential_ttl: 1h

upstream:
  url: http://httpbin.org  # Using httpbin as a test upstream
  timeout: 30s
  max_idle_conns: 100

observability:
  log_level: info
  log_format: text
  otel_enabled: false
