# Keyline Authentication Proxy - Example Configuration
# 
# This file demonstrates all available configuration options for Keyline.
# Environment variables can be substituted using ${VAR_NAME} syntax.
# 
# For production use:
# 1. Copy this file to config.yaml
# 2. Set all required environment variables
# 3. Adjust settings for your environment
# 4. Validate with: keyline --validate-config

# ============================================================================
# Server Configuration
# ============================================================================
server:
  # Port to listen on (default: 9000)
  port: 9000
  
  # Deployment mode:
  # - forward_auth: For use with Traefik/Nginx ForwardAuth
  # - standalone: Standalone reverse proxy mode
  mode: forward_auth
  
  # HTTP timeouts
  read_timeout: 30s
  write_timeout: 30s
  
  # Maximum concurrent requests (0 = unlimited)
  # Requests exceeding this limit receive 503 Service Unavailable
  max_concurrent: 1000

# ============================================================================
# OIDC Authentication Configuration
# ============================================================================
oidc:
  # Enable OIDC authentication

  
  # OIDC provider issuer URL (e.g., https://accounts.google.com)
  # Must be HTTPS for security
  issuer_url: ${OIDC_ISSUER_URL}
  
  # OAuth2 client credentials
  client_id: ${OIDC_CLIENT_ID}
  client_secret: ${OIDC_CLIENT_SECRET}
  
  # Redirect URL for OAuth2 callback
  # Must match the redirect URI configured in your OIDC provider
  redirect_url: https://auth.example.com/auth/callback
  
  # OAuth2 scopes to request
  scopes:
    - openid
    - email
    - profile
  
  # User identity claim (used as the ES username when user_management is enabled)
  # Common values: "email", "sub", "preferred_username"
  # Default: "email"
  user_identity_claim: email
  
  # Claim-based ES user mappings (legacy mode - only used when user_management.enabled is false)
  # When user_management is enabled, use role_mappings instead
  # Evaluated in order - first match wins
  # Supports wildcard patterns with *
  mappings:
    - claim: email
      pattern: "*@admin.example.com"
      es_user: admin
    - claim: email
      pattern: "john.doe@example.com"
      es_user: superuser
    - claim: email
      pattern: "*@example.com"
      es_user: readonly
    - claim: groups
      pattern: "elasticsearch-admins"
      es_user: admin
  
  # Default ES user if no mappings match (legacy mode)
  # Only used when user_management.enabled is false
  default_es_user: readonly

# ============================================================================
# Local Users Configuration (Basic Auth)
# ============================================================================
local_users:
  # Enable local user authentication
  # Useful for service accounts, CI/CD, monitoring

  
  # Local user definitions
  # Generate bcrypt hashes with: htpasswd -bnBC 10 "" password | tr -d ':\n'
      password_bcrypt: ${TESTUSER_PASSWORD_BCRYPT}
      groups:
        - developers
        - users
      email: testuser@example.com
      full_name: Test User
    
    - username: admin
      password_bcrypt: ${ADMIN_PASSWORD_BCRYPT}
      groups:
        - admin
        - superusers
      email: admin@example.com
      full_name: Admin User
    
    - username: viewer
      password_bcrypt: ${VIEWER_PASSWORD_BCRYPT}
      # No groups - will use default_es_roles if user_management is enabled
      email: viewer@example.com
      full_name: Viewer User
    
    - username: ci-pipeline
      password_bcrypt: ${CI_PASSWORD_BCRYPT}
      groups:
        - ci
      email: ci@example.com
      full_name: CI Pipeline
    
    - username: monitoring
      password_bcrypt: ${MONITORING_PASSWORD_BCRYPT}
      groups:
        - monitoring
      email: monitoring@example.com
      full_name: Monitoring Service

# ============================================================================
# Session Management Configuration
# ============================================================================
session:
  # Session time-to-live (duration format: 1h, 30m, 24h)
  ttl: 24h
  
  # Session cookie name
  cookie_name: keyline_session
  
  # Cookie domain (use .example.com for subdomain sharing)
  cookie_domain: .example.com
  
  # Cookie path
  cookie_path: /
  
  # Session secret for cookie signing (minimum 32 bytes)
  # Generate with: openssl rand -base64 32
  session_secret: ${SESSION_SECRET}

# ============================================================================
# Cache Backend Configuration
# ============================================================================
cache:
  # Cache backend: redis or memory
  # Use redis for production (session persistence across restarts and horizontal scaling)
  # Use memory for development/testing (single-node only)
  backend: redis
  
  # Redis connection URL
  # Format: redis://[:password@]host[:port][/database]
  redis_url: ${REDIS_URL}
  
  # Redis password (if not included in redis_url)
  redis_password: ${REDIS_PASSWORD}
  
  # Redis database number (0-15)
  redis_db: 0
  
  # Credential cache TTL (how long generated ES passwords are cached)
  # After TTL expires, new password is generated and ES user is updated
  # Duration format: 1h, 30m, 24h
  # Only used when user_management.enabled is true
  credential_ttl: 1h
  
  # Encryption key for cached credentials (REQUIRED when user_management is enabled)
  # Must be exactly 32 bytes (256 bits) for AES-256-GCM encryption
  # Generate with: openssl rand -base64 32
  # IMPORTANT: All Keyline instances must use the same key (for Redis)
  # Store securely in environment variable, not in config file
  encryption_key: ${CACHE_ENCRYPTION_KEY}

# ============================================================================
# Role Mappings Configuration (for Dynamic User Management)
# ============================================================================
# Maps user groups/claims to Elasticsearch roles
# Applies to ALL authentication methods (OIDC, Basic Auth with groups, etc.)
# Multiple matching groups result in multiple ES roles
# Only used when user_management.enabled is true
role_mappings:
  # Group-based mappings (works for OIDC groups and local user groups)
  - claim: groups
    pattern: "admin"
    es_roles:
      - superuser
  
  - claim: groups
    pattern: "superusers"
    es_roles:
      - superuser
  
  - claim: groups
    pattern: "*-developers"  # Matches "backend-developers", "frontend-developers", etc.
    es_roles:
      - developer
      - kibana_user
  
  - claim: groups
    pattern: "developers"
    es_roles:
      - developer
      - kibana_user
  
  - claim: groups
    pattern: "viewers"
    es_roles:
      - viewer
  
  - claim: groups
    pattern: "ci"
    es_roles:
      - ci_user
  
  - claim: groups
    pattern: "monitoring"
    es_roles:
      - monitoring_user
  
  # Email-based mappings (works for OIDC and local users with email)
  - claim: email
    pattern: "*@admin.example.com"
    es_roles:
      - superuser

# Default ES roles if NO role mappings matched
# Only applied when user has no groups OR no groups matched any pattern
# If empty and no mapping matches, access is denied
# Only used when user_management.enabled is true
default_es_roles:
  - viewer
  - kibana_user

# ============================================================================
# Elasticsearch Credentials Configuration
# ============================================================================
elasticsearch:
  # Admin credentials for user management API (REQUIRED when user_management is enabled)
  # This user must have the 'manage_security' privilege in Elasticsearch
  # Used exclusively for Security API calls (creating/updating users)
  admin_user: ${ES_ADMIN_USER}
  admin_password: ${ES_ADMIN_PASSWORD}
  
  # Elasticsearch cluster URL for API calls
  url: ${ES_URL}
  
  # Request timeout for ES API calls
  timeout: 30s
  
  # Skip TLS certificate verification (NOT recommended for production)
  insecure_skip_verify: false
  
  # ES user credentials for static credential mapping (legacy mode)
  # Only used when user_management.enabled is false
  # When user_management is enabled, users are created dynamically

# ============================================================================
# Dynamic User Management Configuration
# ============================================================================
user_management:
  # Enable dynamic Elasticsearch user management
  # When enabled, Keyline automatically creates/updates ES users for ALL authenticated users
  # Provides accountability, auditing, and proper role-based access control
  # When disabled, uses static credential mapping (elasticsearch.users)

  
  # Generated password length (minimum: 32 characters)
  # Passwords are cryptographically random and never logged
  password_length: 32
  
  # Credential TTL (how long passwords are cached before regeneration)
  # After TTL expires, new password is generated and ES user is updated
  # Duration format: 5m, 1h, 24h
  # Range: 5 minutes to 24 hours
  credential_ttl: 1h

# ============================================================================
# Upstream Configuration (Standalone Mode Only)
# ============================================================================
upstream:
  # Upstream service URL (e.g., Kibana, Elasticsearch)
  url: http://kibana:5601
  
  # Request timeout
  timeout: 30s
  
  # Maximum idle connections in pool
  max_idle_conns: 100

# ============================================================================
# Observability Configuration
# ============================================================================
observability:
  # Logging configuration (loggergo)
  log_level: info  # debug, info, warn, error
  log_format: json  # json or text
  
  # OpenTelemetry configuration (otelgo)
  otel_enabled: true
  otel_endpoint: http://otel-collector:4318
  otel_service_name: keyline
  otel_service_version: ${VERSION}
  otel_environment: production
  
  # Trace sampling ratio (0.0 to 1.0)
  # 1.0 = 100% sampling (all requests traced)
  # 0.1 = 10% sampling (1 in 10 requests traced)
  otel_trace_ratio: 1.0
  
  # Prometheus metrics
  metrics_enabled: true

# ============================================================================
# Example Configurations for Different Scenarios
# ============================================================================

# Example 1: ForwardAuth with Traefik
# -------------------------------------
# server:
#   mode: forward_auth
# 
# Traefik configuration:
# http:
#   middlewares:
#     keyline-auth:
#       forwardAuth:
#         address: http://keyline:9000
#         authResponseHeaders:
#           - X-Es-Authorization

# Example 2: Standalone Proxy for Kibana
# ---------------------------------------
# server:
#   mode: standalone
# upstream:
#   url: http://kibana:5601

# Example 3: OIDC with Google
# ----------------------------
# oidc:
#   enabled: true
#   issuer_url: https://accounts.google.com
#   client_id: your-client-id.apps.googleusercontent.com
#   client_secret: ${GOOGLE_CLIENT_SECRET}
#   redirect_url: https://auth.example.com/auth/callback
#   scopes:
#     - openid
#     - email
#     - profile
#   user_identity_claim: email

# Example 4: Memory Cache for Development
# ----------------------------------------
# cache:
#   backend: memory

# Example 5: Dynamic User Management with Role Mappings
# ------------------------------------------------------
# user_management:
#   enabled: true
#   password_length: 32
#   credential_ttl: 1h
# 
# role_mappings:
#   - claim: groups
#     pattern: "admin"
#     es_roles:
#       - superuser
#   - claim: groups
#     pattern: "developers"
#     es_roles:
#       - developer
#       - kibana_user
#   - claim: email
#     pattern: "*@admin.example.com"
#     es_roles:
#       - superuser
# 
# default_es_roles:
#   - viewer
#   - kibana_user
# 
# cache:
#   encryption_key: ${CACHE_ENCRYPTION_KEY}  # 32 bytes
#   credential_ttl: 1h
# 
# elasticsearch:
#   admin_user: ${ES_ADMIN_USER}
#   admin_password: ${ES_ADMIN_PASSWORD}
#   url: https://elasticsearch:9200

# Example 6: Static Credential Mapping (Legacy Mode)
# ---------------------------------------------------
# user_management:
#   enabled: false
# 
# oidc:
#   mappings:
#     - claim: email
#       pattern: "*@admin.example.com"
#       es_user: admin
#     - claim: email
#       pattern: "*@example.com"
#       es_user: readonly
#   default_es_user: readonly
# 
# elasticsearch:
#   users:
#     - username: admin
#       password: ${ES_ADMIN_PASSWORD}
