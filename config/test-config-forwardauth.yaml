server:
  port: 9000
  mode: forward_auth
  read_timeout: 30s
  write_timeout: 30s

local_users:
  enabled: true
  users:
    - username: testuser
      password_bcrypt: $2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy
      es_user: test_es_user

oidc:
  enabled: false

session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

cache:
  backend: memory

elasticsearch:
  users:
    - username: test_es_user
      password: test_password

observability:
  log_level: info
  log_format: text
  otel_enabled: false
