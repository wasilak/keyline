server:
  port: 9000
  mode: forward_auth
  read_timeout: 30s
  write_timeout: 30s

local_users:
  enabled: true
  users:
    - username: testuser
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      es_user: elastic

oidc:
  enabled: false

session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

cache:
  backend: memory

elasticsearch:
  users:
    - username: elastic
      password: ${ES_PASSWORD}

observability:
  log_level: debug
  log_format: text
  otel_enabled: false
