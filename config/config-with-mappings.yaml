server:
  port: 9001
  mode: forward_auth
  read_timeout: 30s
  write_timeout: 30s

# Enable both OIDC and local users for testing
local_users:
  enabled: true
  users:
    - username: testuser
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      es_user: elastic

oidc:
  enabled: true
  issuer_url: http://localhost:8091/default
  client_id: keyline-test
  client_secret: test-secret
  redirect_url: http://localhost:9001/auth/callback
  scopes:
    - openid
    - profile
    - email
  
  # Claim-based access control examples:
  # 
  # Example 1: Email-based mapping
  claim_mappings:
    # Admin users get elastic superuser
    - claim: email
      pattern: "*@admin.example.com"
      es_user: elastic
    
    # Regular users get read-only access
    - claim: email
      pattern: "*@example.com"
      es_user: readonly_user
    
    # Specific user mapping
    - claim: email
      pattern: "john.doe@company.com"
      es_user: john_es_user
  
  # Example 2: Group-based mapping (supports array claims!)
  # If your OIDC provider sends groups as an array: ["admin", "users", "developers"]
  # You can match against any group in the array:
  #
  #   - claim: groups
  #     pattern: "admin"
  #     es_user: elastic
  #
  #   - claim: groups
  #     pattern: "elasticsearch-admins"
  #     es_user: elastic
  #
  #   - claim: groups
  #     pattern: "developers"
  #     es_user: dev_user
  #
  #   - claim: groups
  #     pattern: "viewers"
  #     es_user: readonly_user
  #
  # Wildcards work with groups too:
  #   - claim: groups
  #     pattern: "*-admins"
  #     es_user: elastic
  
  # Example 3: Role-based mapping (string claim)
  #   - claim: role
  #     pattern: "admin"
  #     es_user: elastic
  #
  #   - claim: role
  #     pattern: "developer"
  #     es_user: dev_user
  #
  #   - claim: role
  #     pattern: "viewer"
  #     es_user: readonly_user
  
  # IMPORTANT: Remove or comment out default_es_user to deny access if no mapping matches
  # With default_es_user set, anyone who authenticates gets this ES user
  # Without it, authentication fails if no claim_mapping matches
  # default_es_user: elastic  # COMMENTED OUT - deny access by default

session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: .localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

cache:
  backend: memory

elasticsearch:
  users:
    - username: elastic
      password: ${ES_PASSWORD}
    - username: readonly_user
      password: ${ES_PASSWORD}
    - username: dev_user
      password: ${ES_PASSWORD}
    - username: john_es_user
      password: ${ES_PASSWORD}

# Upstream config is not used in forward_auth mode
upstream:
  url: https://keyline-oidc-fa-es01:9200
  timeout: 30s
  max_idle_conns: 100
  insecure_skip_verify: true

observability:
  log_level: debug
  log_format: text
  otel_enabled: false
