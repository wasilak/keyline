server:
  port: 9000
  mode: standalone
  read_timeout: 30s
  write_timeout: 30s
  max_concurrent: 1000

# Local users for testing
local_users:
  enabled: true
  users:
    - username: testuser
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      groups:
        - developers
        - users
      email: testuser@example.com
      full_name: Test User

    - username: admin
      password_bcrypt: $2a$10$.5DtVFvSJulN385UxctyseY7skwExS1tRZbCeV2p43g8vkDVsAAEu  # password: "password"
      groups:
        - admin
      email: admin@example.com
      full_name: Admin User

oidc:
  enabled: true
  issuer_url: http://localhost:8090/default
  client_id: keyline-test
  client_secret: test-secret
  redirect_url: http://localhost:9000/auth/callback
  scopes:
    - openid
    - profile
    - email
  user_identity_claim: email

session:
  ttl: 24h
  cookie_name: keyline_session
  cookie_domain: localhost
  cookie_path: /
  session_secret: this-is-a-test-secret-at-least-32-bytes-long

cache:
  backend: memory
  credential_ttl: 1h
  encryption_key: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==

role_mappings:
  - claim: groups
    pattern: "admin"
    es_roles:
      - superuser

  - claim: groups
    pattern: "developers"
    es_roles:
      - developer
      - kibana_user

  - claim: email
    pattern: "*@admin.example.com"
    es_roles:
      - superuser

default_es_roles:
  - viewer
  - kibana_user

elasticsearch:
  admin_user: elastic
  admin_password: ${ES_PASSWORD}
  url: https://localhost:9201
  timeout: 30s
  insecure_skip_verify: true

user_management:
  password_length: 32
  credential_ttl: 1h

upstream:
  url: https://localhost:9201
  timeout: 30s
  max_idle_conns: 100
  insecure_skip_verify: true

observability:
  log_level: debug
  log_format: text
  otel_enabled: false
