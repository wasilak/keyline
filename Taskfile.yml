# Keyline Taskfile
# Run `task` to see all available tasks
# https://taskfile.dev

version: '3'

tasks:
  # Core workflow
  default:
    desc: Show all available tasks
    cmds:
      - task --list

  dev:
    desc: Build and run the server
    cmds:
      - task: build
      - task: run

  run:
    desc: Run the server
    cmds:
      - ./bin/keyline --config config.yaml

  # Build & Quality
  build:
    desc: Build the Go binary
    cmds:
      - go build -o bin/keyline ./cmd/keyline

  lint:
    desc: Run Go linter (vet and fmt check)
    cmds:
      - go vet ./...
      - |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code not formatted. Run 'task format' to fix."
          gofmt -d .
          exit 1
        fi

  test:
    desc: Run Go tests with warnings as errors (matches CI)
    env:
      GOFLAGS: "-v"
    cmds:
      - go test ./...

  format:
    desc: Format Go code
    cmds:
      - gofmt -w .
      - goimports -w .

  # CI/CD
  ci:
    desc: Run complete CI/CD pipeline (in parallel)
    cmds:
      - task: ci:backend
      - task: docs:build
    parallel: true

  ci:backend:
    desc: Run complete backend CI/CD checks
    cmds:
      - echo "=== BACKEND CI/CD ==="
      - echo "1. Go fmt check..."
      - gofmt -l .
      - echo "✅ PASSED"
      - echo ""
      - echo "2. Go vet..."
      - go vet ./...
      - echo "✅ PASSED"
      - echo ""
      - echo "3. Go test..."
      - go test -v ./...
      - echo "✅ PASSED"
      - echo ""
      - echo "=== BACKEND CI/CD COMPLETE ==="

  # Docker
  docker:build:
    desc: Build Docker image for amd64 (uses version from git tag)
    cmds:
      - |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        docker build --platform linux/amd64 -t keyline:$VERSION -t keyline:latest .

  docker:build:multiarch:
    desc: Build Docker image for multiple architectures
    cmds:
      - |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        docker buildx build --platform linux/amd64,linux/arm64 -t keyline:$VERSION -t keyline:latest .

  # Release
  release:build:
    desc: Build binary for release
    cmds:
      - go build -ldflags="-w -s" -o bin/keyline ./cmd/keyline

  release:build:target:
    desc: Build binary for specific target (set GOOS and GOARCH env vars)
    cmds:
      - |
        mkdir -p ./dist
        CGO_ENABLED=0 GOOS=${GOOS:-linux} GOARCH=${GOARCH:-amd64} go build -ldflags="-w -s" -o ./dist/keyline-${GOOS}-${GOARCH} ./cmd/keyline

  # Version
  version:bump:
    desc: "Create local git tag (usage: task version:bump -- v1.3.0 or task version:bump -- -f v1.3.0)"
    cmds:
      - ./scripts/bump-version.sh {{.CLI_ARGS}}

  # Documentation
  docs:install:
    desc: Install Docusaurus dependencies
    dir: docs
    cmds:
      - npm ci

  docs:dev:
    desc: Start Docusaurus development server (serves at http://localhost:3000/keyline/)
    dir: docs
    cmds:
      - npm run start

  docs:build:
    desc: Build Docusaurus documentation for production
    dir: docs
    env:
      NODE_OPTIONS: "--no-deprecation"
    cmds:
      - npm run build

  docs:preview:
    desc: Preview production Docusaurus build (serves at http://localhost:3000/keyline/)
    dir: docs
    cmds:
      - npm run serve

  # Build
  clean:
    desc: Clean all build artifacts
    cmds:
      - rm -rf bin/
      - rm -rf dist/
      - rm -rf artifacts/
      - rm -rf docs/node_modules
      - rm -rf docs/build
      - rm -rf docs/.docusaurus
