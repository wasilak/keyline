services:
  # Setup container to generate SSL certificates
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.1}
    container_name: keyline-oidc-setup
    volumes:
      - keyline_oidc_certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable";
          exit 1;
        fi;
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: keyline-oidc-es01\n"\
          "    dns:\n"\
          "      - keyline-oidc-es01\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions"
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert config/certs/ca/ca.crt https://keyline-oidc-es01:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "All done!";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/keyline-oidc-es01/keyline-oidc-es01.crt ]"]
      interval: 1s
      timeout: 5s
      retries: 120
    networks:
      - keyline-oidc-net

  # Mock OIDC Provider
  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: keyline-oidc-provider
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      - JSON_CONFIG={"interactiveLogin":true}
    networks:
      - keyline-oidc-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/default/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Elasticsearch single node with SSL
  keyline-oidc-es01:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.1}
    container_name: keyline-oidc-es01
    volumes:
      - keyline_oidc_certs:/usr/share/elasticsearch/config/certs
      - keyline_oidc_es01_data:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"
    environment:
      - node.name=keyline-oidc-es01
      - cluster.name=keyline-oidc-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/keyline-oidc-es01/keyline-oidc-es01.key
      - xpack.security.http.ssl.certificate=certs/keyline-oidc-es01/keyline-oidc-es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/keyline-oidc-es01/keyline-oidc-es01.key
      - xpack.security.transport.ssl.certificate=certs/keyline-oidc-es01/keyline-oidc-es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=trial
    mem_limit: 1073741824
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - keyline-oidc-net

volumes:
  keyline_oidc_certs:
    driver: local
  keyline_oidc_es01_data:
    driver: local

networks:
  keyline-oidc-net:
    driver: bridge
