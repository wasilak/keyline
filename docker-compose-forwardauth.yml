services:
  # Setup container to generate SSL certificates
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.1}
    container_name: keyline-forwardauth-setup
    volumes:
      - keyline_forwardauth_certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
          exit 1;
        fi;
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: keyline-forwardauth-es01\n"\
          "    dns:\n"\
          "      - keyline-forwardauth-es01\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions"
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert config/certs/ca/ca.crt https://keyline-forwardauth-es01:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "All done!";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/keyline-forwardauth-es01/keyline-forwardauth-es01.crt ]"]
      interval: 1s
      timeout: 5s
      retries: 120
    networks:
      - keyline-forwardauth-net

  # Traefik reverse proxy with forward auth
  traefik:
    image: traefik:v3.6
    container_name: keyline-forwardauth-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.trustedIPs=0.0.0.0/0,::/0"
      - "--log.level=DEBUG"
      # Configure default servers transport to skip TLS verification
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - "8080:80"      # HTTP entry point
      - "8081:8080"    # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - keyline-forwardauth-net
    depends_on:
      keyline-forwardauth-es01:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Elasticsearch single node with SSL
  keyline-forwardauth-es01:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.1}
    container_name: keyline-forwardauth-es01
    volumes:
      - keyline_forwardauth_certs:/usr/share/elasticsearch/config/certs
      - keyline_forwardauth_es01_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      - node.name=keyline-forwardauth-es01
      - cluster.name=keyline-forwardauth-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/keyline-forwardauth-es01/keyline-forwardauth-es01.key
      - xpack.security.http.ssl.certificate=certs/keyline-forwardauth-es01/keyline-forwardauth-es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/keyline-forwardauth-es01/keyline-forwardauth-es01.key
      - xpack.security.transport.ssl.certificate=certs/keyline-forwardauth-es01/keyline-forwardauth-es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=trial
    mem_limit: 1073741824
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - keyline-forwardauth-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elasticsearch.rule=Host(`es.localhost`)"
      - "traefik.http.routers.elasticsearch.entrypoints=web"
      - "traefik.http.services.elasticsearch.loadbalancer.server.port=9200"
      - "traefik.http.services.elasticsearch.loadbalancer.server.scheme=https"
      # Forward auth middleware - points to Keyline running on host
      - "traefik.http.routers.elasticsearch.middlewares=keyline-auth"
      - "traefik.http.middlewares.keyline-auth.forwardauth.address=http://host.docker.internal:9000/auth/verify"
      - "traefik.http.middlewares.keyline-auth.forwardauth.authResponseHeaders=Authorization"

volumes:
  keyline_forwardauth_certs:
    driver: local
  keyline_forwardauth_es01_data:
    driver: local

networks:
  keyline-forwardauth-net:
    driver: bridge
